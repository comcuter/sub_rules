custom_proxy_group=自动选择|新加坡`url-test`(?i)(新加坡|狮城|sg|singapore)`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=公司屏蔽`select`[]DIRECT`[]代理

rename=(?i)^(.*)(香港|hk|hong kong)(.*)$@01-HK $1$2$3
rename=(?i)^(.*)(新加坡|狮城|sg|singapore)(.*)$@02-SG $1$2$3
rename=(?i)^(.*)(日本|jp|japan|tokyo|osaka)(.*)$@03-JP $1$2$3
rename=(?i)^(.*)(台湾|台灣|tw|taiwan)(.*)$@04-TW $1$2$3

enable_rule_generator=true
overwrite_original_rules=true

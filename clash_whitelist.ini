custom_proxy_group=苹果相关`select`.*`[]DIRECT`[]代理
custom_proxy_group=手工选择`select`.*
custom_proxy_group=无规则匹配`select`[]代理`[]DIRECT
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,100

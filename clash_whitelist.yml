custom:
  enable_rule_generator: true
  overwrite_original_rules: true

  rulesets:
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/REJECT.list"
      group: REJECT
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/OfficeBlock.list"
      group: 公司屏蔽
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list"
      group: 苹果相关
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list"
      group: OpenAI
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list"
      group: OpenAI
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/OpenAI.list"
      group: OpenAI
    - ruleset: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list"
      group: OpenAI
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list"
      group: 代理
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/PROXY.list"
      group: 代理
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list"
      group: DIRECT
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/LocalAreaNetwork.list"
      group: DIRECT
    - ruleset: "https://raw.githubusercontent.com/comcuter/sub_rules/main/DIRECT.list"
      group: DIRECT
    - ruleset: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list"
      group: DIRECT
    - rule: "GEOIP,CN"
      group: DIRECT
    - rule: "FINAL"
      group: 无规则匹配

  proxy_groups:
    - name: 手工选择
      type: select
      rule:
        - ".*"

    - name: 自动选择
      type: url-test
      rule:
        - ".*"
      url: "http://www.gstatic.com/generate_204"
      interval: 300
      tolerance: 100

    - name: "自动选择|香港"
      type: url-test
      rule:
        - "(?i)(香港|hk|hong kong)"
      url: "http://www.gstatic.com/generate_204"
      interval: 300
      tolerance: 100

    - name: "自动选择|新加坡"
      type: url-test
      rule:
        - "(?i)(新加坡|狮城|sg|singapore)"
      url: "http://www.gstatic.com/generate_204"
      interval: 300
      tolerance: 100

    - name: 公司屏蔽
      type: select
      rule:
        - "[]DIRECT"
        - "[]代理"

    - name: 苹果相关
      type: select
      rule:
        - ".*"
        - "[]DIRECT"
        - "[]代理"

    - name: OpenAI
      type: select
      rule:
        - ".*"

    - name: 无规则匹配
      type: select
      rule:
        - "[]代理"
        - "[]DIRECT"

    - name: 代理
      type: select
      rule:
        - "[]手工选择"
        - "[]自动选择"
        - "[]自动选择|香港"
        - "[]自动选择|新加坡"

  rename_node:
    - match: "(?i)^(.*)(香港|hk|hong kong)(.*)$"
      replace: "01-HK $1$2$3"
    - match: "(?i)^(.*)(新加坡|狮城|sg|singapore)(.*)$"
      replace: "02-SG $1$2$3"
    - match: "(?i)^(.*)(日本|jp|japan|tokyo|osaka)(.*)$"
      replace: "03-JP $1$2$3"
    - match: "(?i)^(.*)(台湾|台灣|tw|taiwan)(.*)$"
      replace: "04-TW $1$2$3"
